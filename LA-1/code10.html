<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Example</title>
</head>

<body>

    <table border="1" align="center">
        <!-- Row 1: Table Heading -->
        <tr style="background-color: lightgreen; font-weight: bold;">
            <th>Student ID</th>
            <th>Name</th>
            <th>Grade</th>
        </tr>

        <!-- Row 2: Data -->
        <tr>
            <td>101</td>
            <td>Alice Johnson</td>
            <td>A+</td>
        </tr>

        <!-- Row 3: Data -->
        <tr>
            <td>102</td>
            <td>Bob Smith</td>
            <td>B</td>
        </tr>
    </table>

</body>

</html>
