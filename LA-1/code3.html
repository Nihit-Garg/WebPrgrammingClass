<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Elements Example</title>
</head>

<body>

    <div>
        <h2>This is a Heading inside a div</h2>
    </div>

    <p>This is the first paragraph below the division. A paragraph is a block-level element that typically contains
        text.</p>

    <p>This is the second paragraph. Block-level elements always start on a new line and take up the full width
        available to them.</p>

</body>

</html>
