<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Breaks and Horizontal Rule Example</title>
</head>

<body>

    <p>This is the first part of the paragraph.<br>
        This text appears on a new line because of the first break tag.<br>
        And this text is on yet another line thanks to the second break tag.</p>

    <hr>

    <p>This is another paragraph that appears after the horizontal line.</p>

</body>

</html>
