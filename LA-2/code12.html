<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal</title>
    <link rel="stylesheet" href="styles12.css">
</head>

<body>
    <div class="student-info">Nihit Garg - 24BCE0627</div>

    <!-- Main heading -->
    <h1>Student Registration Portal</h1>

    <!-- Navigation Section -->
    <nav>
        <a href="#personal-info">Personal Information</a>
        <a href="#academic-details">Academic Details</a>
        <a href="#address-info">Address Information</a>
        <a href="#account-credentials">Account Credentials</a>
    </nav>

    <!-- Registration Form -->
    <form onsubmit="alert('Form Submitted Successfully'); return false;">

        <!-- Section 1: Personal Information -->
        <div id="personal-info" class="form-section">
            <h2>Section 1: Personal Information</h2>
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile Number:</label>
                <input type="text" id="mobile" name="mobile" pattern="[0-9]{10}"
                    title="Please enter a valid 10-digit mobile number" required>
            </div>
        </div>

        <!-- Section 2: Academic Details -->
        <div id="academic-details" class="form-section">
            <h2>Section 2: Academic Details</h2>
            <div class="form-group">
                <label for="regNumber">Register Number:</label>
                <input type="text" id="regNumber" name="regNumber" required>
            </div>
            <div class="form-group">
                <label for="degree">Degree Program:</label>
                <input type="text" id="degree" name="degree" required>
            </div>
            <div class="form-group">
                <label for="department">Department:</label>
                <input type="text" id="department" name="department" required>
            </div>
            <div class="form-group">
                <label for="yearOfStudy">Year of Study:</label>
                <select id="yearOfStudy" name="yearOfStudy" required>
                    <option value="">Select Year</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
        </div>

        <!-- Section 3: Address Information (Added placeholders to complete 4 sections) -->
        <div id="address-info" class="form-section">
            <h2>Section 3: Address Information</h2>
            <div class="form-group">
                <label for="address">Street Address:</label>
                <textarea id="address" name="address" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
                <label for="state">State:</label>
                <input type="text" id="state" name="state" required>
            </div>
        </div>

        <!-- Section 4: Account Credentials (Added placeholders to complete 4 sections) -->
        <div id="account-credentials" class="form-section">
            <h2>Section 4: Account Credentials</h2>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="submit-container">
            <button type="submit">Submit Registration</button>
        </div>

    </form>
</body>

</html>
