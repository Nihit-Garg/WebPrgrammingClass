<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlighted Content</title>
    <style>
        /* Element-prefixed class selectors */
        h2.highlight-content {
            color: blue;
        }

        p.highlight-content {
            background-color: lightblue;
        }
    </style>
</head>

<body>
    <h2>Nihit Garg - 24BCE0627</h2>
    <h2 class="highlight-content">Blue Economy and Maritime Growth</h2>
    <p class="highlight-content">The blue economy promotes sustainable use of ocean resources for economic growth and
        environmental protection.</p>
</body>

</html>
