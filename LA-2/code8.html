<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Awareness</title>
    <style>
        /* Styling for the block-level <div> element */
        div.product-info {
            background-color: #f0f0f0;
            /* Light gray background */
            padding: 20px;
            /* Padding inside the div */
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        /* Styling for the inline-level <span> element to highlight the price */
        span.highlight-price {
            color: green;
            font-weight: bold;
            font-size: 1.2em;
            background-color: yellow;
            /* Extra highlight */
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <h2>Nihit Garg - 24BCE0627</h2>

    <div class="product-info">
        Agricultural Equipment Price: <span class="highlight-price">₹50,000</span>
    </div>
</body>

</html>
