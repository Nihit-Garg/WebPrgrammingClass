<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Priority Demonstration</title>
    <style>
        /* Internal CSS applying a red color to all paragraphs */
        p {
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <h2>Nihit Garg - 24BCE0627</h2>

    <!-- The inline style (color: blue) will override the internal style (color: red) -->
    <p style="color: blue;">Inline CSS takes precedence over internal CSS in case of conflicts.</p>
</body>

</html>
